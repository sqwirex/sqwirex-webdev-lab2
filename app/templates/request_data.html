{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h1 class="h3 mb-3">{{ data_title }}</h1>
    {% if rows %}
      <div class="table-responsive">
        <table class="table table-striped align-middle">
          <thead>
            <tr>
              <th style="width: 35%;">Ключ</th>
              <th>Значение</th>
            </tr>
          </thead>
          <tbody>
            {% for key, value in rows %}
            <tr>
              <td><code>{{ key }}</code></td>
              <td>{{ value }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    {% else %}
      <div class="alert alert-secondary mb-0">Данные отсутствуют.</div>
    {% endif %}
  </div>
</div>
{% endblock %}
