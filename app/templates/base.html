<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>{{ title or 'Лабораторная работа №2' }}</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">Лабораторная №2</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('show_url_params', demo='1', page='2') }}">URL</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('show_headers') }}">Headers</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('show_cookies') }}">Cookies</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('login') }}">Авторизация</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('phone') }}">Телефон</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="py-4">
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer class="footer mt-auto py-3 border-top bg-light">
      <div class="container d-flex flex-column flex-md-row justify-content-between gap-2">
        <span>{{ full_name }}</span>
        <span>Группа: {{ group_number }}</span>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
